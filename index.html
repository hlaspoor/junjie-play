<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Junjie Play, a board game playground" />
    <link rel="icon" href="/logo.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="stylesheet" href="/src/styles.css" />
    <title>Junjie Play</title>
  </head>
  <body>
    <main class="page-shell">
      <section class="hero" aria-labelledby="page-title">
        <div class="brand-copy">
          <img class="brand-logo" src="/logo.svg" alt="" aria-hidden="true" />
          <h1 id="page-title"><span>Junjie</span> <span>Play</span></h1>
          <p>a board game playground</p>
        </div>
      </section>

      <section class="game-row" aria-label="Games">
        <article class="game-tile hadron">
          <div class="card-copy">
            <h2>Hadron</h2>
            <p>last placement<br />wins</p>
          </div>
          <a
            class="game-card"
            href="https://hadron-4kz.pages.dev/"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Open Hadron in a new window"
          >
            <div class="board hadron-board" aria-hidden="true">
              <span class="cell"></span>
              <span class="cell"><i class="checker red"></i></span>
              <span class="cell"></span>
              <span class="cell"></span>
              <span class="cell edge-right"></span>
              <span class="cell"><i class="checker blue"></i></span>
              <span class="cell"></span>
              <span class="cell"><i class="checker red"></i></span>
              <span class="cell"></span>
              <span class="cell edge-right"></span>
              <span class="cell"></span>
              <span class="cell"><i class="checker blue"></i></span>
              <span class="cell"></span>
              <span class="cell"><i class="checker red"></i></span>
              <span class="cell edge-right"><i class="checker red"></i></span>
              <span class="cell"><i class="checker blue"></i></span>
              <span class="cell"></span>
              <span class="cell"></span>
              <span class="cell"><i class="checker blue"></i></span>
              <span class="cell edge-right"><i class="checker blue"></i></span>
              <span class="cell edge-bottom"><i class="checker red"></i></span>
              <span class="cell edge-bottom"><i class="checker red"></i></span>
              <span class="cell edge-bottom"></span>
              <span class="cell edge-bottom"></span>
              <span class="cell edge-right edge-bottom"></span>
            </div>
          </a>
        </article>

        <article class="game-tile mijnlieff">
          <div class="card-copy">
            <h2>Mijnlieff</h2>
            <p>each piece shapes<br />the next move</p>
          </div>
          <a
            class="game-card"
            href="https://mijnlieff.pages.dev/"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Open Mijnlieff in a new window"
          >
            <div class="board mijnlieff-board" aria-hidden="true">
              <img class="mijn-board-svg" src="/mijnlieff-board.svg" alt="" />
              <div class="mijn-grid">
                <span><img class="mijn-piece" src="/mijnlieff-piece-white-snail.svg" alt="" /></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span><img class="mijn-piece" src="/mijnlieff-piece-green-butterfly.svg" alt="" /></span>
                <span><img class="mijn-piece" src="/mijnlieff-piece-green-dragonfly.svg" alt="" /></span>
                <span></span>
                <span></span>
                <span><img class="mijn-piece" src="/mijnlieff-piece-green-snail.svg" alt="" /></span>
                <span><img class="mijn-piece" src="/mijnlieff-piece-white-ladybug.svg" alt="" /></span>
                <span><img class="mijn-piece" src="/mijnlieff-piece-white-dragonfly.svg" alt="" /></span>
                <span><img class="mijn-piece" src="/mijnlieff-piece-white-butterfly.svg" alt="" /></span>
                <span><img class="mijn-piece" src="/mijnlieff-piece-green-ladybug.svg" alt="" /></span>
                <span></span>
                <span></span>
              </div>
            </div>
          </a>
        </article>

        <article class="game-tile kamisado">
          <div class="card-copy">
            <h2>Kamisado</h2>
            <p>reach your opponent's<br />home row with a tower</p>
          </div>
          <a
            class="game-card"
            href="https://kamisado.pages.dev"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Open Kamisado in a new window"
          >
            <div class="board kamisado-board" aria-hidden="true">
              <span class="orange"><i class="tower gold orange"></i></span>
            <span class="blue"><i class="tower gold blue"></i></span>
            <span class="purple"><i class="tower gold purple"></i></span>
            <span class="pink"><i class="tower gold pink"></i></span>
            <span class="yellow"><i class="tower gold yellow"></i></span>
            <span class="red"><i class="tower gold red"></i></span>
            <span class="green"><i class="tower gold green"></i></span>
            <span class="brown"><i class="tower gold brown"></i></span>
            <span class="red"></span>
            <span class="orange"></span>
            <span class="pink"></span>
            <span class="green"></span>
            <span class="blue"></span>
            <span class="yellow"></span>
            <span class="brown"></span>
            <span class="purple"></span>
            <span class="green"></span>
            <span class="pink"></span>
            <span class="orange"></span>
            <span class="red"></span>
            <span class="purple"></span>
            <span class="brown"></span>
            <span class="yellow"></span>
            <span class="blue"></span>
            <span class="pink"></span>
            <span class="purple"></span>
            <span class="blue"></span>
            <span class="orange"></span>
            <span class="brown"></span>
            <span class="green"></span>
            <span class="red"></span>
            <span class="yellow"></span>
            <span class="yellow"></span>
            <span class="red"></span>
            <span class="green"></span>
            <span class="brown"></span>
            <span class="orange"></span>
            <span class="blue"></span>
            <span class="purple"></span>
            <span class="pink"></span>
            <span class="blue"></span>
            <span class="yellow"></span>
            <span class="brown"></span>
            <span class="purple"></span>
            <span class="red"></span>
            <span class="orange"></span>
            <span class="pink"></span>
            <span class="green"></span>
            <span class="purple"></span>
            <span class="brown"></span>
            <span class="yellow"></span>
            <span class="blue"></span>
            <span class="green"></span>
            <span class="pink"></span>
            <span class="orange"></span>
            <span class="red"></span>
            <span class="brown"><i class="tower black brown"></i></span>
            <span class="green"><i class="tower black green"></i></span>
            <span class="red"><i class="tower black red"></i></span>
            <span class="yellow"><i class="tower black yellow"></i></span>
            <span class="pink"><i class="tower black pink"></i></span>
            <span class="purple"><i class="tower black purple"></i></span>
            <span class="blue"><i class="tower black blue"></i></span>
              <span class="orange"><i class="tower black orange"></i></span>
            </div>
          </a>
        </article>

        <article class="game-tile four-up">
          <div class="card-copy">
            <h2>Four-Up</h2>
            <p>marble four<br />in a row</p>
          </div>
          <a
            class="game-card"
            href="https://four-up-ad6.pages.dev/"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Open Four-Up in a new window"
          >
            <div class="board fourup-board" aria-hidden="true">
              <span class="void"></span><span class="void"></span><span class="void"></span><span></span><span class="void"></span><span class="void"></span><span class="void"></span>
            <span class="void"></span><span class="void"></span><span></span><span></span><span></span><span><i class="fourup-stone white"></i></span><span class="void"></span>
            <span class="void"></span><span></span><span><i class="fourup-stone white"></i></span><span></span><span></span><span><i class="fourup-stone black"></i></span><span class="void"></span>
            <span></span><span></span><span></span><span><i class="fourup-stone black"></i></span><span></span><span><i class="fourup-stone white"></i></span><span><i class="fourup-stone white"></i></span>
            <span></span><span></span><span><i class="fourup-stone black"></i></span><span><i class="fourup-stone black"></i></span><span><i class="fourup-stone white"></i></span><span><i class="fourup-stone black"></i></span><span></span>
            <span class="void"></span><span></span><span><i class="fourup-stone white"></i></span><span><i class="fourup-stone black"></i></span><span><i class="fourup-stone black"></i></span><span><i class="fourup-stone white"></i></span><span class="void"></span>
            <span class="void"></span><span></span><span></span><span><i class="fourup-stone black"></i></span><span></span><span class="void"></span><span class="void"></span>
              <span class="void"></span><span class="void"></span><span class="void"></span><span></span><span class="void"></span><span class="void"></span><span class="void"></span>
            </div>
          </a>
        </article>

        <article class="game-tile make-shift">
          <div class="card-copy">
            <h2>Make-Shift</h2>
            <p>tic-tac-toe<br />on sliding stones</p>
          </div>
          <a
            class="game-card"
            href="https://make-shift.pages.dev"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Open Make-Shift in a new window"
          >
            <div class="board shift-board" aria-hidden="true">
              <span><i class="push-stone"><b class="stone madder"></b></i></span>
              <span><i class="push-stone"><b class="stone ivory"></b></i></span>
              <span><i class="push-stone"></i></span>
              <span><i class="push-stone"><b class="stone ivory"></b></i></span>
              <span><i class="push-stone"><b class="stone ivory"></b></i></span>
              <span><i class="push-stone"></i></span>
              <span><i class="push-stone"><b class="stone madder"></b></i></span>
              <span class="hole"></span>
              <span><i class="push-stone"><b class="stone madder"></b></i></span>
            </div>
          </a>
        </article>

        <article class="game-tile chung-toi">
          <div class="card-copy">
            <h2>Chung Toi</h2>
            <p>tic-tac-toe<br />with a twist</p>
          </div>
          <a
            class="game-card"
            href="https://chung-toi.pages.dev"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Open Chung Toi in a new window"

            <div class="board chung-board" aria-hidden="true">
            <span><i class="piece white orthogonal"><svg viewBox="0 0 100 100" focusable="false"><defs><radialGradient id="chung-piece-gradient-0" cx=".5" cy=".5" r=".64" fx=".5" fy=".5"><stop offset="0" stop-color="var(--piece-light)"/><stop offset=".6" stop-color="var(--piece-fill)"/><stop offset="1" stop-color="var(--piece-edge)"/></radialGradient></defs><g class="piece-shadow" transform="translate(0 10)"><path class="piece-shadow-shape" d="M34 5 H66 Q70 5 73 8 L92 27 Q95 30 95 34 V66 Q95 70 92 73 L73 92 Q70 95 66 95 H34 Q30 95 27 92 L8 73 Q5 70 5 66 V34 Q5 30 8 27 L27 8 Q30 5 34 5 Z" fill="rgba(47, 47, 43, .32)"/></g><g class="piece-face"><path class="piece-top" d="M34 5 H66 Q70 5 73 8 L92 27 Q95 30 95 34 V66 Q95 70 92 73 L73 92 Q70 95 66 95 H34 Q30 95 27 92 L8 73 Q5 70 5 66 V34 Q5 30 8 27 L27 8 Q30 5 34 5 Z" fill="url(#chung-piece-gradient-0)" stroke="var(--piece-stroke)" stroke-width="5" stroke-linejoin="round"/><g class="piece-mark" opacity=".84"><g stroke="var(--piece-mark)" stroke-width="4" stroke-linecap="round"><line x1="34" y1="50" x2="66" y2="50"/><line x1="50" y1="34" x2="50" y2="66"/></g><g fill="var(--piece-mark)"><path d="M15 50 Q15 48.8 16.4 48.2 L32.6 43.9 Q35 43.2 35 45.5 V54.5 Q35 56.8 32.6 56.1 L16.4 51.8 Q15 51.2 15 50 Z"/><path d="M85 50 Q85 48.8 83.6 48.2 L67.4 43.9 Q65 43.2 65 45.5 V54.5 Q65 56.8 67.4 56.1 L83.6 51.8 Q85 51.2 85 50 Z"/><path d="M50 15 Q48.8 15 48.2 16.4 L43.9 32.6 Q43.2 35 45.5 35 H54.5 Q56.8 35 56.1 32.6 L51.8 16.4 Q51.2 15 50 15 Z"/><path d="M50 85 Q48.8 85 48.2 83.6 L43.9 67.4 Q43.2 65 45.5 65 H54.5 Q56.8 65 56.1 67.4 L51.8 83.6 Q51.2 85 50 85 Z"/></g></g></g></svg></i></span>
            <span></span>
            <span></span>
            <span><i class="piece white diagonal"><svg viewBox="0 0 100 100" focusable="false"><defs><radialGradient id="chung-piece-gradient-1" cx=".5" cy=".5" r=".64" fx=".5" fy=".5"><stop offset="0" stop-color="var(--piece-light)"/><stop offset=".6" stop-color="var(--piece-fill)"/><stop offset="1" stop-color="var(--piece-edge)"/></radialGradient></defs><g class="piece-shadow" transform="translate(0 10)"><path class="piece-shadow-shape" d="M34 5 H66 Q70 5 73 8 L92 27 Q95 30 95 34 V66 Q95 70 92 73 L73 92 Q70 95 66 95 H34 Q30 95 27 92 L8 73 Q5 70 5 66 V34 Q5 30 8 27 L27 8 Q30 5 34 5 Z" fill="rgba(47, 47, 43, .32)"/></g><g class="piece-face"><path class="piece-top" d="M34 5 H66 Q70 5 73 8 L92 27 Q95 30 95 34 V66 Q95 70 92 73 L73 92 Q70 95 66 95 H34 Q30 95 27 92 L8 73 Q5 70 5 66 V34 Q5 30 8 27 L27 8 Q30 5 34 5 Z" fill="url(#chung-piece-gradient-1)" stroke="var(--piece-stroke)" stroke-width="5" stroke-linejoin="round"/><g class="piece-mark" opacity=".84"><g stroke="var(--piece-mark)" stroke-width="4" stroke-linecap="round"><line x1="34" y1="50" x2="66" y2="50"/><line x1="50" y1="34" x2="50" y2="66"/></g><g fill="var(--piece-mark)"><path d="M15 50 Q15 48.8 16.4 48.2 L32.6 43.9 Q35 43.2 35 45.5 V54.5 Q35 56.8 32.6 56.1 L16.4 51.8 Q15 51.2 15 50 Z"/><path d="M85 50 Q85 48.8 83.6 48.2 L67.4 43.9 Q65 43.2 65 45.5 V54.5 Q65 56.8 67.4 56.1 L83.6 51.8 Q85 51.2 85 50 Z"/><path d="M50 15 Q48.8 15 48.2 16.4 L43.9 32.6 Q43.2 35 45.5 35 H54.5 Q56.8 35 56.1 32.6 L51.8 16.4 Q51.2 15 50 15 Z"/><path d="M50 85 Q48.8 85 48.2 83.6 L43.9 67.4 Q43.2 65 45.5 65 H54.5 Q56.8 65 56.1 67.4 L51.8 83.6 Q51.2 85 50 85 Z"/></g></g></g></svg></i></span>
            <span><i class="piece red diagonal"><svg viewBox="0 0 100 100" focusable="false"><defs><radialGradient id="chung-piece-gradient-2" cx=".5" cy=".5" r=".64" fx=".5" fy=".5"><stop offset="0" stop-color="var(--piece-light)"/><stop offset=".6" stop-color="var(--piece-fill)"/><stop offset="1" stop-color="var(--piece-edge)"/></radialGradient></defs><g class="piece-shadow" transform="translate(0 10)"><path class="piece-shadow-shape" d="M34 5 H66 Q70 5 73 8 L92 27 Q95 30 95 34 V66 Q95 70 92 73 L73 92 Q70 95 66 95 H34 Q30 95 27 92 L8 73 Q5 70 5 66 V34 Q5 30 8 27 L27 8 Q30 5 34 5 Z" fill="rgba(47, 47, 43, .32)"/></g><g class="piece-face"><path class="piece-top" d="M34 5 H66 Q70 5 73 8 L92 27 Q95 30 95 34 V66 Q95 70 92 73 L73 92 Q70 95 66 95 H34 Q30 95 27 92 L8 73 Q5 70 5 66 V34 Q5 30 8 27 L27 8 Q30 5 34 5 Z" fill="url(#chung-piece-gradient-2)" stroke="var(--piece-stroke)" stroke-width="5" stroke-linejoin="round"/><g class="piece-mark" opacity=".84"><g stroke="var(--piece-mark)" stroke-width="4" stroke-linecap="round"><line x1="34" y1="50" x2="66" y2="50"/><line x1="50" y1="34" x2="50" y2="66"/></g><g fill="var(--piece-mark)"><path d="M15 50 Q15 48.8 16.4 48.2 L32.6 43.9 Q35 43.2 35 45.5 V54.5 Q35 56.8 32.6 56.1 L16.4 51.8 Q15 51.2 15 50 Z"/><path d="M85 50 Q85 48.8 83.6 48.2 L67.4 43.9 Q65 43.2 65 45.5 V54.5 Q65 56.8 67.4 56.1 L83.6 51.8 Q85 51.2 85 50 Z"/><path d="M50 15 Q48.8 15 48.2 16.4 L43.9 32.6 Q43.2 35 45.5 35 H54.5 Q56.8 35 56.1 32.6 L51.8 16.4 Q51.2 15 50 15 Z"/><path d="M50 85 Q48.8 85 48.2 83.6 L43.9 67.4 Q43.2 65 45.5 65 H54.5 Q56.8 65 56.1 67.4 L51.8 83.6 Q51.2 85 50 85 Z"/></g></g></g></svg></i></span>
            <span><i class="piece white diagonal"><svg viewBox="0 0 100 100" focusable="false"><defs><radialGradient id="chung-piece-gradient-3" cx=".5" cy=".5" r=".64" fx=".5" fy=".5"><stop offset="0" stop-color="var(--piece-light)"/><stop offset=".6" stop-color="var(--piece-fill)"/><stop offset="1" stop-color="var(--piece-edge)"/></radialGradient></defs><g class="piece-shadow" transform="translate(0 10)"><path class="piece-shadow-shape" d="M34 5 H66 Q70 5 73 8 L92 27 Q95 30 95 34 V66 Q95 70 92 73 L73 92 Q70 95 66 95 H34 Q30 95 27 92 L8 73 Q5 70 5 66 V34 Q5 30 8 27 L27 8 Q30 5 34 5 Z" fill="rgba(47, 47, 43, .32)"/></g><g class="piece-face"><path class="piece-top" d="M34 5 H66 Q70 5 73 8 L92 27 Q95 30 95 34 V66 Q95 70 92 73 L73 92 Q70 95 66 95 H34 Q30 95 27 92 L8 73 Q5 70 5 66 V34 Q5 30 8 27 L27 8 Q30 5 34 5 Z" fill="url(#chung-piece-gradient-3)" stroke="var(--piece-stroke)" stroke-width="5" stroke-linejoin="round"/><g class="piece-mark" opacity=".84"><g stroke="var(--piece-mark)" stroke-width="4" stroke-linecap="round"><line x1="34" y1="50" x2="66" y2="50"/><line x1="50" y1="34" x2="50" y2="66"/></g><g fill="var(--piece-mark)"><path d="M15 50 Q15 48.8 16.4 48.2 L32.6 43.9 Q35 43.2 35 45.5 V54.5 Q35 56.8 32.6 56.1 L16.4 51.8 Q15 51.2 15 50 Z"/><path d="M85 50 Q85 48.8 83.6 48.2 L67.4 43.9 Q65 43.2 65 45.5 V54.5 Q65 56.8 67.4 56.1 L83.6 51.8 Q85 51.2 85 50 Z"/><path d="M50 15 Q48.8 15 48.2 16.4 L43.9 32.6 Q43.2 35 45.5 35 H54.5 Q56.8 35 56.1 32.6 L51.8 16.4 Q51.2 15 50 15 Z"/><path d="M50 85 Q48.8 85 48.2 83.6 L43.9 67.4 Q43.2 65 45.5 65 H54.5 Q56.8 65 56.1 67.4 L51.8 83.6 Q51.2 85 50 85 Z"/></g></g></g></svg></i></span>
            <span></span>
            <span><i class="piece red orthogonal"><svg viewBox="0 0 100 100" focusable="false"><defs><radialGradient id="chung-piece-gradient-4" cx=".5" cy=".5" r=".64" fx=".5" fy=".5"><stop offset="0" stop-color="var(--piece-light)"/><stop offset=".6" stop-color="var(--piece-fill)"/><stop offset="1" stop-color="var(--piece-edge)"/></radialGradient></defs><g class="piece-shadow" transform="translate(0 10)"><path class="piece-shadow-shape" d="M34 5 H66 Q70 5 73 8 L92 27 Q95 30 95 34 V66 Q95 70 92 73 L73 92 Q70 95 66 95 H34 Q30 95 27 92 L8 73 Q5 70 5 66 V34 Q5 30 8 27 L27 8 Q30 5 34 5 Z" fill="rgba(47, 47, 43, .32)"/></g><g class="piece-face"><path class="piece-top" d="M34 5 H66 Q70 5 73 8 L92 27 Q95 30 95 34 V66 Q95 70 92 73 L73 92 Q70 95 66 95 H34 Q30 95 27 92 L8 73 Q5 70 5 66 V34 Q5 30 8 27 L27 8 Q30 5 34 5 Z" fill="url(#chung-piece-gradient-4)" stroke="var(--piece-stroke)" stroke-width="5" stroke-linejoin="round"/><g class="piece-mark" opacity=".84"><g stroke="var(--piece-mark)" stroke-width="4" stroke-linecap="round"><line x1="34" y1="50" x2="66" y2="50"/><line x1="50" y1="34" x2="50" y2="66"/></g><g fill="var(--piece-mark)"><path d="M15 50 Q15 48.8 16.4 48.2 L32.6 43.9 Q35 43.2 35 45.5 V54.5 Q35 56.8 32.6 56.1 L16.4 51.8 Q15 51.2 15 50 Z"/><path d="M85 50 Q85 48.8 83.6 48.2 L67.4 43.9 Q65 43.2 65 45.5 V54.5 Q65 56.8 67.4 56.1 L83.6 51.8 Q85 51.2 85 50 Z"/><path d="M50 15 Q48.8 15 48.2 16.4 L43.9 32.6 Q43.2 35 45.5 35 H54.5 Q56.8 35 56.1 32.6 L51.8 16.4 Q51.2 15 50 15 Z"/><path d="M50 85 Q48.8 85 48.2 83.6 L43.9 67.4 Q43.2 65 45.5 65 H54.5 Q56.8 65 56.1 67.4 L51.8 83.6 Q51.2 85 50 85 Z"/></g></g></g></svg></i></span>
              <span><i class="piece red orthogonal"><svg viewBox="0 0 100 100" focusable="false"><defs><radialGradient id="chung-piece-gradient-5" cx=".5" cy=".5" r=".64" fx=".5" fy=".5"><stop offset="0" stop-color="var(--piece-light)"/><stop offset=".6" stop-color="var(--piece-fill)"/><stop offset="1" stop-color="var(--piece-edge)"/></radialGradient></defs><g class="piece-shadow" transform="translate(0 10)"><path class="piece-shadow-shape" d="M34 5 H66 Q70 5 73 8 L92 27 Q95 30 95 34 V66 Q95 70 92 73 L73 92 Q70 95 66 95 H34 Q30 95 27 92 L8 73 Q5 70 5 66 V34 Q5 30 8 27 L27 8 Q30 5 34 5 Z" fill="rgba(47, 47, 43, .32)"/></g><g class="piece-face"><path class="piece-top" d="M34 5 H66 Q70 5 73 8 L92 27 Q95 30 95 34 V66 Q95 70 92 73 L73 92 Q70 95 66 95 H34 Q30 95 27 92 L8 73 Q5 70 5 66 V34 Q5 30 8 27 L27 8 Q30 5 34 5 Z" fill="url(#chung-piece-gradient-5)" stroke="var(--piece-stroke)" stroke-width="5" stroke-linejoin="round"/><g class="piece-mark" opacity=".84"><g stroke="var(--piece-mark)" stroke-width="4" stroke-linecap="round"><line x1="34" y1="50" x2="66" y2="50"/><line x1="50" y1="34" x2="50" y2="66"/></g><g fill="var(--piece-mark)"><path d="M15 50 Q15 48.8 16.4 48.2 L32.6 43.9 Q35 43.2 35 45.5 V54.5 Q35 56.8 32.6 56.1 L16.4 51.8 Q15 51.2 15 50 Z"/><path d="M85 50 Q85 48.8 83.6 48.2 L67.4 43.9 Q65 43.2 65 45.5 V54.5 Q65 56.8 67.4 56.1 L83.6 51.8 Q85 51.2 85 50 Z"/><path d="M50 15 Q48.8 15 48.2 16.4 L43.9 32.6 Q43.2 35 45.5 35 H54.5 Q56.8 35 56.1 32.6 L51.8 16.4 Q51.2 15 50 15 Z"/><path d="M50 85 Q48.8 85 48.2 83.6 L43.9 67.4 Q43.2 65 45.5 65 H54.5 Q56.8 65 56.1 67.4 L51.8 83.6 Q51.2 85 50 85 Z"/></g></g></g></svg></i></span>

        <article class="game-tile placeholder-tile" aria-label="Empty game slot">
          <div class="game-card placeholder-card"></div>

    </main>
  </body>
</html>
